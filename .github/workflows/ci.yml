name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  sdk:
    name: SDK — Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: cd sdk && npm ci
      - run: cd sdk && npx tsc --noEmit
      - run: cd sdk && npm run build

  sdk-test:
    name: SDK — Unit Tests
    runs-on: ubuntu-latest
    needs: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: cd sdk && npm ci
      - run: cd sdk && npm test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [server, sdk]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: traces
          POSTGRES_PASSWORD: traces
          POSTGRES_DB: traces
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://traces:traces@localhost:5432/traces
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: cd sdk && npm ci && npm run build
      - name: Start server
        run: |
          node dist/src/server.js &
          sleep 5
      - name: Health check
        run: curl -f http://localhost:3100/health
      - name: Run integration tests
        run: npm run test:integration
